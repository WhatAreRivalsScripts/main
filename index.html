<!DOCTYPE html>
<html>
<head>
    <title>Redirecting...</title>
    <!-- Method 1: Meta Refresh (Redirects after 0 seconds) -->
    <meta http-equiv="refresh" content="0; url=https://whatarerivalsscripts.github.io">
</head>
<body>
    <p>If you are not redirected automatically, follow this <a href="https://whatarerivalsscripts.github.io">link</a>.</p>

    <script type="text/javascript">
        // Method 2: JavaScript Redirect (Backup)
        window.location.href = "https://whatarerivalsscripts.github.io";
    </script>
</body>
</html>
